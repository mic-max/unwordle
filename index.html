<!doctype html>
<html lang="en">
<head>
	<title>UnWordle</title>
    <link rel="stylesheet" href="style.css">
	<link rel="icon" href="favicon.png">
	<link rel="preload" href="words.bin" as="fetch" crossorigin>
</head>
<body>
	<h1>UnWordle</h1>
    <p>Requirements:</p>
    <ul>
        <li>Super hard mode rules*</li>
        <li>Solved in 2 to 6 guesses</li>
        <li>Wordle day <= 1765</li>
    </ul>

	<div id="mode-selector">
		<label><input type="radio" name="input-mode" value="paste" checked> Paste scorecard</label>
		<label><input type="radio" name="input-mode" value="grid-day"> Grid + Day number</label>
		<label><input type="radio" name="input-mode" value="grid-answer"> Grid + Answer word</label>
		<span id="parse-status" style="font-size:1.4em;vertical-align:middle;margin-left:8px"></span>
	</div>
	<div id="paste-input">
		<textarea id="input" rows="9" cols="15" placeholder="Paste here"></textarea>
	</div>
	<div id="grid-input">
		<div id="grid"></div>
		<div id="grid-extras">
			<label>Day number: <input type="number" id="day-input" min="0" max="1765" placeholder="e.g. 1750"></label>
			<label>Answer word: <input type="text" id="answer-input" maxlength="5" placeholder="e.g. crane"></label>
		</div>
	</div>
	<div id="dev-examples"></div>
	<div>
		<button id="run" disabled>Find Paths</button>
		<span id="status">Loading word list...</span>
	</div>
	<details id="answer-spoiler" style="display:none">
		<summary id="answer-summary"></summary>
		<span id="answer-word"></span>
	</details>
	<div>
		<textarea id="output" rows="40" cols="80" readonly></textarea>
	</div>

    <script src="examples.js"></script>
    <script src="lib.js"></script>
	<script src="index.js"></script>
</body>
</html>
